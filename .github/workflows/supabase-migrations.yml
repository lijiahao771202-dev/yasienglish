name: Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/migrations/**"
      - "scripts/supabase-*.mjs"
      - ".github/workflows/supabase-migrations.yml"
      - "package.json"
      - "README.md"
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "scripts/supabase-*.mjs"
      - ".github/workflows/supabase-migrations.yml"
      - "package.json"
      - "README.md"

jobs:
  check:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
    runs-on: macos-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Assert Supabase token is configured
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing repository secret SUPABASE_ACCESS_TOKEN." >&2
            exit 1
          fi

      - name: Check cloud migration drift
        run: npm run supabase:migrations:check
