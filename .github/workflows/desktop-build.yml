name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: npm run desktop:build:mac
            artifact_glob: dist-desktop/*.dmg
          - os: windows-latest
            script: npm run desktop:build:win
            artifact_glob: dist-desktop/*.exe

    runs-on: ${{ matrix.os }}

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: ${{ matrix.script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            dist-desktop/*.dmg
            dist-desktop/*.zip
            dist-desktop/*.exe
            dist-desktop/*.blockmap
